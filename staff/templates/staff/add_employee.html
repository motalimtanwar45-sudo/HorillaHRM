<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Employee - Enterprise HR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .form-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08); width: 450px; border-top: 5px solid #38bdf8; }
        h2 { margin-bottom: 24px; color: #0f172a; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #475569; font-weight: 600; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; outline: none; transition: 0.2s; }
        input:focus, select:focus { border-color: #38bdf8; box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15); }
        .btn-submit { background: #0f172a; color: white; border: none; width: 100%; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-submit:hover { background: #1e293b; transform: translateY(-1px); }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #64748b; text-decoration: none; font-size: 14px; font-weight: 500; }
        .back-link:hover { color: #0f172a; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>➕ Add New Employee</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="e.g. Rahul Sharma" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="e.g. rahul@company.com" required>
            </div>
            <div class="form-group">
                <label>Department</label>
                <select name="department">
                    <option value="HR">Human Resources (HR)</option>
                    <option value="Tech">Technology / IT</option>
                    <option value="Sales">Sales & Marketing</option>
                    <option value="Finance">Finance</option>
                </select>
            </div>
            <button type="submit" class="btn-submit">Save Employee</button>
            <a href="/dashboard/" class="back-link">← Cancel and Go Back</a>
        </form>
    </div>
</body>
</html>
